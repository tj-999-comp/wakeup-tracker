<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f7fb;
            font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            color: #243043;
        }

        .wrapper {
            width: 100%;
            background: #f4f7fb;
            padding: 24px 0;
        }

        .container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e6ebf2;
        }

        .header {
            background: linear-gradient(135deg, #5b8def 0%, #7b61ff 100%);
            color: #ffffff;
            padding: 28px 32px;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: 26px;
            line-height: 1.3;
        }

        .header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.95;
        }

        .section {
            padding: 24px 32px;
        }

        .section-title {
            margin: 0 0 16px;
            font-size: 24px;
            font-weight: bold;
            color: #1e2a3a;
        }

        .metrics {
            width: 100%;
            border-collapse: separate;
            border-spacing: 12px;
        }

        .metric-card {
            background: #f8faff;
            border: 1px solid #e3ebfb;
            border-radius: 14px;
            padding: 16px;
            vertical-align: top;
        }

        .metric-label {
            font-size: 12px;
            color: #66758a;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #22314a;
        }

        .summary-grid {
            width: 100%;
            border-collapse: separate;
            border-spacing: 12px;
        }

        .summary-card {
            background: #ffffff;
            border: 1px solid #e9edf5;
            border-radius: 14px;
            padding: 16px;
            vertical-align: top;
        }

        .summary-card h2,
        .summary-card h3 {
            margin: 0 0 12px;
            font-size: 20px;
            color: #344256;
        }

        .summary-line {
            margin: 6px 0;
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }

        .summary-label {
            display: inline-block;
            width: 75%;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
            vertical-align: baseline;
            white-space: nowrap;
        }

        .summary-value {
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            color: #22314a;
            text-align: left;
            vertical-align: baseline;
            white-space: nowrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-weekday {
            background: #e8f0ff;
            color: #2f5ec4;
        }

        .badge-holiday {
            background: #fff1e8;
            color: #c96a22;
        }

        .table-wrap {
            border: 1px solid #e8edf5;
            border-radius: 14px;
            overflow: hidden;
        }

        table.daily-table {
            width: 100%;
            border-collapse: collapse;
        }

        .daily-table th {
            background: #f7f9fc;
            color: #516074;
            font-size: 12px;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid #e8edf5;
        }

        .daily-table td {
            font-size: 14px;
            padding: 8px 10px;
            border-bottom: 1px solid #eef2f7;
        }

        .daily-table td:nth-child(3) {
            white-space: nowrap;
        }

        .daily-table tr:last-child td {
            border-bottom: none;
        }

        .footer {
            padding: 18px 32px 28px;
            font-size: 12px;
            color: #758296;
        }
        
        .muted {
            color: #7b8798;
        }
        
        .earliest {
            color: #2ca9e1;
        }

        .latest {
            color: #b94047;
        }

        .result {
            display: inline;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>
                    <?= view.title ?>
                </h1>
                <p>対象期間:
                    <?= view.periodLabel ?>
                </p>
            </div>

            <div class="section">
                <h2 class="section-title">今週の集計結果</h2>
                <table class="metrics" role="presentation">
                    <tr>
                        <td class="metric-card">
                            <div class="metric-label">記録日数</div>
                            <div class="metric-value">
                                <?= view.recordDays ?>
                            </div>
                        </td>
                        <td class="metric-card">
                            <div class="metric-label">総記録数</div>
                            <div class="metric-value">
                                <?= view.totalRecords ?>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="metric-card">
                            <div class="metric-label">平日平均</div>
                            <div class="metric-value">
                                <?= view.weekdayAverage ?>
                            </div>
                        </td>
                        <td class="metric-card">
                            <div class="metric-label">休日平均</div>
                            <div class="metric-value">
                                <?= view.holidayAverage ?>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>

            <div class="section">
                <h2 class="section-title">Earliest / Latest</h2>
                <table class="summary-grid" role="presentation">
                    <tr>
                        <td class="summary-card" width="50%">
                            <h2>Weekday</h2>
                            <div class="summary-line">
                                <span class="summary-label earliest">Earliest</span>
                                <span class="summary-value result"><?= view.weekdayEarliestText ?></span>
                            </div>
                            <div class="summary-line">
                                <span class="summary-label latest">Latest</span>
                                <span class="summary-value result"><?= view.weekdayLatestText ?></span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="summary-card" width="50%">
                            <h2>Holiday</h2>
                            <div class="summary-line">
                                <span class="summary-label earliest">Earliest</span>
                                <span class="summary-value result"><?= view.holidayEarliestText ?></span>
                            </div>
                            <div class="summary-line">
                                <span class="summary-label latest">Latest</span>
                                <span class="summary-value result"><?= view.holidayLatestText ?></span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="summary-card" width="50%">
                            <h2>Over All</h2>
                            <div class="summary-line">
                                <span class="summary-label earliest">Earliest</span>
                                <span class="summary-value result"><?= view.earliestText ?></span>
                            </div>
                            <div class="summary-line">
                                <span class="summary-label latest">Latest</span>
                                <span class="summary-value result"><?= view.latestText ?></span>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>

            <div class="section">
                <h2 class="section-title">日別一覧</h2>
                <div class="table-wrap">
                    <table class="daily-table">
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>曜日</th>
                                <th>起床時刻</th>
                                <th>区分</th>
                            </tr>
                        </thead>
                        <tbody>
                            <? for (let i = 0; i < view.dailyList.length; i++) { 
                     const item = view.dailyList[i];
                ?>
                            <tr>
                                <td>
                                    <?= item.date ?>
                                </td>
                                <td>
                                    <?= item.weekday ?>
                                </td>
                                <td>
                                    <?= item.wakeupTime ?>
                                </td>
                                <td>
                                    <span class="<?= item.badgeClass ?>">
                                        <?= item.badgeLabel ?>
                                    </span>
                                </td>
                            </tr>
                            <? } ?>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="footer">
                Wakeup Tracker によって自動生成された週次レポートです。
            </div>
        </div>
    </div>
</body>

</html>
